<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ファインダー — 覗くと、詩が見える">
  <link rel="canonical" href="https://hainedot.com/">
  <meta property="og:url" content="https://hainedot.com/">
  <meta property="og:site_name" content="ファインダー">
  <title>ファインダー | 覗くと、詩が見える</title>
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body class="is-opening">
  <div class="opening" id="opening">
    <div class="opening-inner">
      <p class="opening-text">ようこそ</p>
      <button type="button" class="opening-enter" id="opening-enter">
        ファインダーを覗いてみる？
      </button>
    </div>
  </div>

  <div class="camera-body">
    <aside class="side-panel">
      <section class="side-profile">
        <p class="side-profile-label">プロフィール</p>
        <button type="button" class="side-profile-name" id="profile-btn">hainedot</button>
      </section>
      <nav class="date-archive" id="date-archive" aria-label="年月日アーカイブ"></nav>
    </aside>

    <div class="finder-hud finder-hud-top">
      <a
        class="hud-link"
        href="https://x.com/hainedot"
        target="_blank"
        rel="noopener noreferrer"
      >@hainedot</a>
    </div>

    <div class="finder-outer">
      <div class="finder-frame" id="finder">
        <div class="finder-glass">
          <div class="finder-grid" aria-hidden="true"></div>
          <div class="finder-corners" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="finder-focus" aria-hidden="true"></div>

          <div class="poem-stage" id="poem-stage">
            <article class="profile-card" id="profile-card">
              <img class="finder-photo" src="images/profile.png" alt="hainedot">
              <div class="profile-content">
                <h1 class="profile-title">hainedot</h1>
                <p class="profile-lead">写真と詩を重ねながら、日常の光を記録しています。</p>
                <dl class="profile-details">
                  <dt>名前</dt>
                  <dd>hainedot</dd>
                  <dt>活動</dt>
                  <dd>写真撮影 / 短詩の執筆</dd>
                  <dt>拠点</dt>
                  <dd>日本 静岡</dd>
                </dl>
                <a
                  class="profile-x-link"
                  href="https://x.com/hainedot"
                  target="_blank"
                  rel="noopener noreferrer"
                >@hainedot の投稿をXで見る</a>
              </div>
            </article>
          </div>
        </div>
        <div class="finder-vignette" aria-hidden="true"></div>
        <div class="shutter-curtain" id="shutter-curtain" aria-hidden="true">
          <div class="shutter-blade shutter-blade-top"></div>
          <div class="shutter-blade shutter-blade-bottom"></div>
        </div>
      </div>
    </div>

    <div class="finder-hud finder-hud-bottom" aria-hidden="true">
      <span class="hud-counter" id="hud-counter">—</span>
      <span class="hud-hint" id="hud-hint">hainedot でプロフィール</span>
    </div>

    <button type="button" class="shutter-btn" id="shutter-btn" aria-label="次の詩へ">
      <span class="shutter-ring"></span>
      <span class="shutter-core"></span>
    </button>

    <button type="button" class="sound-toggle" id="sound-toggle" aria-pressed="true" aria-label="音をオフにする">
      SOUND ON
    </button>

    <nav class="poem-dots" id="poem-dots" aria-label="詩の選択"></nav>
  </div>

  <script src="script.js?v=12"></script>
</body>
</html>
