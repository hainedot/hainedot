<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>投稿 | hainedot</title>
  <link rel="stylesheet" href="../style.css?v=5">
  <link rel="stylesheet" href="post.css?v=6">
</head>
<body class="post-page">
  <header class="post-header">
    <p class="post-kicker">自分専用 · 投稿ページ</p>
    <h1 class="post-brand">hainedot</h1>
    <p class="post-lead">書いてプレビューし、「公開する」を押すとサイトに反映されます。</p>
  </header>

  <div class="post-layout">
    <form class="post-form" id="post-form" autocomplete="off">
      <label class="post-field">
        <span>タイトル</span>
        <input type="text" id="field-title" name="title" placeholder="朝霧" maxlength="40">
      </label>

      <label class="post-field">
        <span>日付（年月日）</span>
        <input type="date" id="field-date" name="date">
      </label>

      <label class="post-field">
        <span>詩（1行ずつ）</span>
        <textarea id="field-body" name="body" rows="6" placeholder="山稜消ゆ　乾坤一白&#10;足音のみ　道標となる"></textarea>
      </label>

      <label class="post-field">
        <span>写真を選ぶ</span>
        <input type="file" id="field-image-file" accept="image/*">
        <small>選んだ写真も一緒にアップロードされます。</small>
      </label>

      <label class="post-field">
        <span>写真ファイル名（既存のものを使う場合）</span>
        <input type="text" id="field-image" name="image" placeholder="poem-01.png" list="image-suggestions">
        <datalist id="image-suggestions">
          <option value="profile.png"></option>
          <option value="slide-01.png"></option>
          <option value="slide-02.png"></option>
          <option value="slide-03.png"></option>
        </datalist>
      </label>

      <label class="post-field">
        <span>合言葉</span>
        <input type="password" id="field-password" name="password" placeholder="自分で決めた合言葉" autocomplete="off">
        <small>GitHub のトークンではありません。Cloudflare に入れた合言葉です。この端末に保存できます。</small>
      </label>

      <div class="post-actions">
        <button type="button" class="post-btn post-btn-accent" id="btn-publish">公開する</button>
        <button type="button" class="post-btn" id="btn-save">下書き保存</button>
        <button type="button" class="post-btn post-btn-ghost" id="btn-clear">クリア</button>
      </div>

      <p class="post-status" id="post-status" aria-live="polite"></p>

      <details class="post-help">
        <summary>はじめて使うとき</summary>
        <ol>
          <li>合言葉を入れて「公開する」</li>
          <li>1〜2分後に <a href="https://hainedot.com/">hainedot.com</a> に反映</li>
          <li>下の一覧から削除もできます</li>
        </ol>
      </details>

      <section class="post-published" aria-label="公開済みの詩">
        <div class="post-published-head">
          <p class="post-preview-label">公開済み</p>
          <button type="button" class="post-btn post-btn-ghost" id="btn-refresh-list">再読み込み</button>
        </div>
        <ul class="post-published-list" id="published-list">
          <li class="post-published-empty">読み込み中…</li>
        </ul>
      </section>
    </form>

    <section class="post-preview-wrap" aria-label="プレビュー">
      <p class="post-preview-label">プレビュー</p>
      <div class="finder-outer post-finder">
        <div class="finder-frame">
          <div class="finder-glass">
            <div class="finder-grid" aria-hidden="true"></div>
            <div class="finder-corners" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="finder-focus" aria-hidden="true"></div>
            <div class="poem-stage">
              <article class="poem-card is-active" id="preview-card">
                <img class="finder-photo" id="preview-photo" src="../images/profile.png" alt="">
                <div class="poem-content">
                  <h1 class="poem-title" id="preview-title">タイトル</h1>
                  <time class="poem-date" id="preview-date" datetime="">日付</time>
                  <div class="poem-body" id="preview-body">
                    <p>ここに詩が表示されます</p>
                  </div>
                </div>
              </article>
            </div>
          </div>
          <div class="finder-vignette" aria-hidden="true"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="post.js?v=6"></script>
</body>
</html>
